<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Single-model mode screenshot placeholder</title>
  <rect width="1200" height="675" fill="#1a1a20"/>
  <rect x="60" y="60" width="1080" height="555" rx="12" fill="none" stroke="#3a3a44" stroke-width="2" stroke-dasharray="10 6"/>
  <text x="600" y="200" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" font-size="30" fill="#f5f5f5" font-weight="600">Mode 1 — GPT only</text>
