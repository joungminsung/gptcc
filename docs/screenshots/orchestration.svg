<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t">
  <title id="t">Orchestration mode screenshot placeholder</title>
  <rect width="1200" height="675" fill="#1a1a20"/>
  <rect x="60" y="60" width="1080" height="555" rx="12" fill="none" stroke="#3a3a44" stroke-width="2" stroke-dasharray="10 6"/>
  <text x="600" y="180" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" font-size="30" fill="#f5f5f5" font-weight="600">Mode 2 — Claude + GPT together</text>
  <text x="600" y="220" text-anchor="middle" font-family="SF Pro Text, system-ui, sans-serif" font-size="16" fill="#8a8a93">Screenshot placeholder</text>
  <g font-family="SF Mono, ui-monospace, monospace" font-size="14">
    <text x="180" y="290" fill="#c5a3ff">Claude (main):</text>
    <text x="180" y="315" fill="#d0d0d8">Reviewing your auth middleware... delegating independent review to GPT.</text>
    <text x="180" y="370" fill="#9ec5ff">Agent(model: "gpt-5.4-fast", prompt: "Review for security issues")</text>
    <text x="180" y="420" fill="#86d08f">GPT (subagent):</text>
    <text x="180" y="445" fill="#d0d0d8">[critical] auth.ts:42 — missing rate limit on login endpoint</text>
    <text x="180" y="470" fill="#d0d0d8">[medium]  auth.ts:88 — JWT expiry not validated on refresh</text>
    <text x="180" y="520" fill="#c5a3ff">Claude:</text>
    <text x="180" y="545" fill="#d0d0d8">Applying fixes to both issues.</text>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="SF Pro Text, system-ui, sans-serif" font-size="12" fill="#4a4a52">See docs/screenshots/README.md for the capture guide</text>
</svg>
